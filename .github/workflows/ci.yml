name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go-quality:
    name: Go quality and lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-go-quality
          repository-cache: true

      - name: Check formatting
        run: |
          bazel run @rules_go//go -- fmt ./...
          git diff --exit-code

      - name: Test
        run: bazel test //...

      - name: Vet
        run: bazel run @rules_go//go -- vet ./...

      - name: Run golangci-lint
        run: bazel run @rules_go//go -- run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.0 run

  integration:
    name: Integration (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-amd64
            runner: windows-2025
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
          - platform: darwin-amd64
            runner: macos-15-intel
          - platform: darwin-arm64
            runner: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-integration-${{ matrix.platform }}
          repository-cache: true

      - name: Test integration
        run: bazel test //integration/...
