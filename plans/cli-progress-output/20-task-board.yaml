plan:
  id: cli-progress-output
  status: accepted
  active_plan_tree: plans/cli-progress-output
  required_full_gate:
    - bazel run @rules_go//go -- fmt ./...
    - git diff --exit-code
    - git --version
    - git merge-tree --write-tree "--merge-base=HEAD^{tree}" "HEAD^{tree}" "HEAD^{tree}"
    - bazel test --test_env=PATH //...
    - bazel run @rules_go//go -- vet ./...
    - bazel run @rules_go//go -- run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.0 run
    - bazel test --test_env=PATH //integration/...

tasks:
  - id: PLAN-01
    title: Create initial requirements and implementation plan
    status: completed
    priority: high
    depends_on: []
    acceptance_criteria:
      - Requirements include locked decisions and open questions with stable Q IDs.
      - Implementation plan records pending decisions and full validation gate.
      - Task board tracks planning, implementation, validation, and approval work.
    files_touched:
      - plans/cli-progress-output/00-requirements.md
      - plans/cli-progress-output/10-implementation-plan.md
      - plans/cli-progress-output/20-task-board.yaml
      - plans/cli-progress-output/30-output-contract.md
    evidence:
      - command: find plans -maxdepth 3 -type f -print
        result: no existing plans directory before this plan was created
      - command: sed -n '1,240p' .github/workflows/ci.yml
        result: CI gate source inspected and reflected in plan
      - command: user decisions Q-01 through Q-05
        result: all open output-contract questions resolved and reflected in plan artifacts
    commit:
      hash: not_required
      message: Planning task tracked in working tree; plan approval task remains active before implementation.

  - id: PLAN-APPROVAL
    title: Resolve grill questions and obtain plan approval
    status: completed
    priority: high
    depends_on:
      - PLAN-01
    acceptance_criteria:
      - All Q-* entries are resolved in requirements.
      - Decision Log reflects every resolved Q-*.
      - Review findings are assessed and valid fixes are reflected in plan artifacts.
      - User review of the latest plan is requested.
      - Plan status is accepted only after feedback is incorporated.
    files_touched:
      - plans/cli-progress-output/00-requirements.md
      - plans/cli-progress-output/10-implementation-plan.md
      - plans/cli-progress-output/20-task-board.yaml
      - plans/cli-progress-output/30-output-contract.md
    evidence:
      - command: iterative-plan-review round 1
        result: six valid findings fixed in plan artifacts
      - command: iterative-plan-review round 2
        result: two valid findings fixed in plan artifacts
      - command: iterative-plan-review round 3
        result: Findings none; scorecard 5/5 completeness, clarity, and implementation safety
      - command: user approval
        result: user requested implementation after review loop completed
    commit:
      hash: 21ae3c926dc19bf496785f1fe15760aac0a10cbe
      message: "docs(plan): add cli progress output plan"

  - id: T-01
    title: Add global quiet parsing and usage behavior
    status: completed
    priority: high
    depends_on:
      - PLAN-APPROVAL
    acceptance_criteria:
      - GlobalOptions includes Quiet.
      - --quiet parses only before command name.
      - --quiet and --verbose fail together.
      - Usage documents --quiet.
      - CLI tests cover accepted and rejected forms.
    files_touched:
      - internal/cli/cli.go
      - internal/cli/cli_test.go
      - README.md
      - docs/migration-from-ruby-braid.md
    evidence:
      - command: bazel test //internal/cli:cli_test
        result: passed
    commit:
      hash: dfa11580d2aab937058f921ffbcc0eec50dd2953
      message: "feat(cli): add global quiet flag parsing"

  - id: T-02
    title: Add progress reporter helper
    status: completed
    priority: high
    depends_on:
      - T-01
    acceptance_criteria:
      - Progress helper writes to stderr-equivalent writer.
      - Quiet disables progress/info.
      - TTY-aware dot ticking is testable.
      - Completion after dots emits a newline before the completed message.
      - Failure and cancellation cleanup emit a newline when needed and never print success completion.
      - Tests use fake ticker/clock behavior and do not sleep 5 seconds.
      - Raw upstream URLs are not included in default messages.
    files_touched:
      - internal/command/*.go
      - internal/command/*_test.go
      - internal/command/BUILD.bazel
    evidence:
      - command: bazel test //internal/command:progress_test
        result: passed
    commit:
      hash: 73891995d11c5d4d48f2222df861dac5fe43c6b0
      message: "feat(command): add progress reporter helper"

  - id: T-03
    title: Integrate progress in all remote/cache-contact workflows
    status: completed
    priority: high
    depends_on:
      - T-02
    acceptance_criteria:
      - Commands emit start/completed progress according to the operation matrix.
      - --quiet suppresses progress but not errors or required data output.
      - --quiet does not suppress warnings or recovery guidance.
      - Existing non-progress command-result and recovery streams are preserved unless explicitly reclassified.
      - status and diff retain their requested stdout data while writing progress only to stderr.
      - Representative tests cover every operation-matrix row in normal and quiet modes.
      - Representative tests cover every stream class: data, progress/info, warning, recovery/result, and error.
      - --verbose continues to include Git argv tracing.
      - Multi-mirror behavior is deterministic and tested.
    files_touched:
      - internal/command/add.go
      - internal/command/update.go
      - internal/command/push.go
      - internal/command/sync.go
      - internal/command/status.go
      - internal/command/diff.go
      - internal/command/setup.go
      - internal/command/progress.go
      - internal/command/BUILD.bazel
      - internal/command/*_test.go
    evidence:
      - command: bazel test //internal/command:progress_integration_test
        result: passed
      - command: bazel run @rules_go//go -- fmt ./...
        result: passed
      - command: bazel test //internal/command:all
        result: passed
    commit:
      hash: 786be7d58e6b79d8bc749bb5f216d601c218a3b9
      message: "feat(command): report remote operation progress"

  - id: T-04
    title: Update output documentation
    status: completed
    priority: medium
    depends_on:
      - T-03
    acceptance_criteria:
      - README documents --quiet and default progress behavior.
      - Migration docs explain intentional Ruby parity and divergences.
      - Docs distinguish stdout data, stderr progress, warnings, and errors.
    files_touched:
      - README.md
      - docs/migration-from-ruby-braid.md
    evidence:
      - command: rg -n -- "--quiet|Output And Quiet Mode|progress|stderr|stdout" README.md docs/migration-from-ruby-braid.md
        result: passed; README and migration docs document quiet mode, progress, stdout, and stderr behavior
    commit:
      hash: pending
      message: pending

  - id: T-05
    title: Run full CI parity and close out
    status: pending
    priority: high
    depends_on:
      - T-04
    acceptance_criteria:
      - Required full gate passes or any inability to run a check is documented.
      - Final report states whether GitHub Actions matrix validation was observed or remains a platform gap.
      - No temporary debugging artifacts remain.
      - Working tree status is reported.
    files_touched:
      - "*"
    evidence: []
    commit:
      hash: pending
      message: pending

