      hash: not_required
      message: not_required

  - id: T01
    title: Add sync CLI parsing and usage
    status: completed
    priority: high
    depends_on:
      - PLAN-APPROVAL
    acceptance_criteria:
      - "`cli.CommandSync` and `cli.SyncOptions` are added."
      - "`braid sync [local_path...] [--pull-only] [--keep]` parses with zero or more paths."
      - Sync path arguments normalize backslashes to slashes.
      - Unknown sync flags fail with existing command-parser diagnostics.
      - Top-level usage lists `sync`.
      - "`braid sync help` prints command-specific usage."
    files_touched:
      - internal/cli/cli.go
      - internal/cli/cli_test.go
    evidence:
      - command: bazel test //internal/cli:cli_test
        result: pass
    commit:
      hash: not_required
      message: not_required

  - id: T02
    title: Add sync handler target planning and up-front precheck
    status: completed
    priority: high
    depends_on:
      - T01
    acceptance_criteria:
      - "`command.NewAppWithOptions` wires `cli.CommandSync` to `SyncHandler`."
      - "`RequirementsFor(cli.CommandSync)` returns Git root, config, and `MayWrite` requirements."
      - Sync loads and validates `.braids.json` once during target planning.
      - No-path sync selects branch/tag mirrors in sorted config order and skips locked mirrors.
      - Explicit sync selects named mirrors in normalized user order.
      - Duplicate explicit paths are rejected after normalization.
      - Missing mirrors return the existing required-mirror error.
      - Mirror paths overlapping `.braids.json` are rejected before side effects.
      - Scoped precheck covers unresolved Git operation state, `.braids.json`, and all selected mirror paths before object hydration or any push/update side effects.
    files_touched:
      - internal/command/preflight.go
      - internal/command/sync.go
      - internal/command/BUILD.bazel
      - internal/command/preflight_test.go
      - internal/command/sync_test.go
    evidence:
      - command: bazel test //internal/command:command_test
        result: pass
    commit:
      hash: not_required
      message: not_required

  - id: T03
    title: Refactor push status and implement sync push phase
    status: completed
    priority: high
    depends_on:
      - T02
    acceptance_criteria:
      - Core push logic reports pushed, no-local-changes, and not-up-to-date states.
      - Sync hydrates missing recorded revision objects after scoped precheck and before push-plan validation.
      - Sync uses side-effect-free committed-local-change classification before upstream freshness checks.
      - Sync classification compares `HEAD:m.Path` against the recorded upstream item at `m.RemotePath` or the whole revision when `m.RemotePath` is empty.
      - Sync validates the complete push plan before any upstream push, editor, worktree, config, or commit side effect.
      - Existing `braid push` stdout and success behavior are preserved.
      - Sync pushes only changed branch mirrors.
      - Sync skips unchanged branch mirrors without printing no-op push messages.
      - Sync does not fail unchanged branch mirrors merely because upstream moved.
      - Sync validates upstream freshness for every changed branch mirror before any push action or editor invocation.
      - Sync hard-fails when a changed branch mirror is not up to date.
      - Default sync rejects selected tag/revision mirrors with committed local changes, including no-path tag mirrors.
      - Default sync rejects selected mirror paths absent from downstream `HEAD` with a clear diagnostic.
      - Sync tests cover changed and unchanged branch mirrors with upstream subdirectory and single-file `--path` mappings.
      - Actual pushes still open one editor per pushed mirror.
    files_touched:
      - internal/command/push.go
      - internal/command/push_test.go
      - internal/command/sync.go
      - internal/command/sync_test.go
    evidence:
      - command: bazel test //internal/command:command_test
        result: pass
    commit:
      hash: not_required
      message: not_required

  - id: T04
    title: Implement sync pull/update phase and phase ordering
    status: completed
    priority: high
    depends_on:
      - T03
    acceptance_criteria:
      - Sync runs pull/update for every selected pull target after the push phase.
      - Successfully pushed mirrors are updated so `.braids.json` records the pushed upstream revision.
      - "`--pull-only` skips all push planning and editor invocation."
      - Sync stops on the first push or update error and does not continue to later mirrors or phases.
      - "`--keep` applies to remotes used by both push and update phases."
      - Default cleanup removes temporary Braid remotes after sync.
    files_touched:
      - internal/command/sync.go
      - internal/command/sync_test.go
      - internal/command/update.go
      - internal/command/push.go
    evidence:
      - command: bazel test //internal/command:command_test
        result: pass
      - command: bazel test //integration:braid_integration_test
        result: pass
    commit:
      hash: not_required
      message: not_required

  - id: T05
    title: Update docs and add executable integration coverage
    status: completed
    priority: medium
    depends_on:
      - T04
    acceptance_criteria:
      - README documents `braid sync`, `--pull-only`, `--keep`, no-path target selection, and explicit path order.
      - README explains branch-only automatic push behavior and selected non-branch local-change diagnostics.
      - Integration test covers default sync pushing local branch mirror changes and then updating `.braids.json`.
      - Integration test covers `--pull-only` updating without pushing or opening an editor.
      - Integration or command coverage proves sync prechecks all selected targets before push/update side effects.
      - Command or integration coverage proves fresh-clone sync hydrates missing recorded revision objects before push planning.
      - Command or integration coverage proves a later push-plan failure prevents earlier upstream pushes.
      - Command or integration coverage proves a later stale changed branch mirror prevents earlier changed branch mirrors from being pushed or opening an editor.
      - "Full gate `bazel test //...` passes."
    files_touched:
      - README.md
      - integration/braid_integration_test.go
      - plans/sync-command/20-task-board.yaml
    evidence:
      - command: bazel run @rules_go//go -- fmt ./internal/cli ./internal/command ./integration
        result: pass
      - command: bazel test //integration:braid_integration_test
        result: pass
      - command: bazel test //...
        result: pass
      - command: git diff --check
        result: pass
    commit:
      hash: not_required
      message: not_required

