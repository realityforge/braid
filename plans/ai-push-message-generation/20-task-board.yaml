  - id: T01
    title: Add generated-message commit plumbing
    status: completed
    priority: high
    depends_on:
      - PLAN-QUESTIONS
    acceptance_criteria:
      - gitexec supports opening the editor with an initial generated message file.
      - gitexec uses `git commit --cleanup=strip -v -F <seed-file> -e`.
      - gitexec exposes and tests a named write-tree helper for temporary index verification.
      - Comment cleanup behavior remains compatible with existing provenance guidance.
      - Unit tests cover the new gitexec command arguments and required seed-file validation.
    files_touched:
      - internal/gitexec/gitexec.go
      - internal/gitexec/gitexec_test.go
    evidence:
      - command: bazel test //internal/gitexec:gitexec_test
        result: PASSED in 4.6s; covered CommitVerboseMessageFile argv, required path validation, and WriteTree helper.
    commit:
      hash: not_required
      message: not_required

  - id: T02
    title: Build prompt and run configured generator
    status: completed
    priority: high
    depends_on:
      - PLAN-QUESTIONS
      - T01
    acceptance_criteria:
      - Braid reads the resolved environment variable only when a push commit will be attempted.
      - Raw provenance collection is split from commented-template formatting.
      - Prompt files include resolved metadata, provenance, inline small diffs or referenced large diff files, and output path instructions.
      - The configured command receives resolved placeholders and generator failures follow the resolved policy.
      - Fatal infrastructure failures stop before editor open; recoverable generator output failures open the editor with diagnostics; optional provenance failures warn and generation proceeds.
      - Empty BRAID_PUSH_COMMIT_MESSAGE_COMMAND is treated as disabled.
      - Tests cover placeholder quoting with spaces and single quotes.
      - Tests cover nonzero exit, missing output file, and whitespace-only generated message.
      - Tests cover the 5 KiB diff cutoff boundary and large-diff file readability through CONTEXT_DIR.
      - Tests cover source core.commentChar=auto and commit.cleanup=whitespace with generator failure diagnostics.
      - Tests cover generation success with source core.commentChar=auto and commit.cleanup=whitespace.
      - Tests cover optional provenance failure while generation still proceeds from metadata and diff context.
      - Tests cover 4 KiB per-stream stdout/stderr truncation in generator failure diagnostics.
      - Tests or documented platform checks cover configured generation failing clearly on Windows while unset generation remains unchanged.
    files_touched:
      - internal/command/push.go
      - internal/command/push_provenance.go
      - internal/command/BUILD.bazel
      - internal/command/*message*.go
      - internal/command/push_test.go
    evidence:
      - command: bazel test //internal/command:command_test
        result: PASSED in 263.3s; covered configured generation success, placeholder quoting, generator failures, large diff context files, provenance failure, auto comment char cleanup, no-op skips, and diagnostics truncation.
      - command: git diff --check
        result: PASSED with no output.
      - command: bazel test //...
        result: PASSED; 10 test targets passed, including cached command/gitexec suites and executed integration targets.
    commit:
      hash: not_required
      message: not_required

  - id: T03
    title: Cover sync push integration
    status: completed
    priority: medium
    depends_on:
      - PLAN-QUESTIONS
      - T01
      - T02
    acceptance_criteria:
      - sync push actions use the same generation-and-review behavior as explicit push.
      - No generation command runs for sync pull-only or skipped/no-change mirrors.
      - No generation command runs for explicit push no-change or not-up-to-date stops.
      - Tests cover at least one sync push action using a fake generator.
      - Tests cover multi-mirror sync where a later generator or editor failure leaves an earlier upstream push completed and skips the update phase.
    files_touched:
      - internal/command/sync_test.go
      - internal/command/push_test.go
    evidence:
      - command: bazel test //internal/command:command_test
        result: PASSED in 263.3s; covered per-mirror sync generation, pull-only/no-push generator skips, and later editor failure after an earlier generated push.
      - command: bazel test //...
        result: PASSED; 10 test targets passed.
    commit:
      hash: not_required
      message: not_required

  - id: T04
    title: Document generated message configuration
    status: completed
    priority: medium
    depends_on:
      - PLAN-QUESTIONS
      - T01
      - T02
      - T03
    acceptance_criteria:
      - README documents the environment variable, placeholders, prompt contents, review behavior, and failure behavior.
      - Documentation states that the configured command is trusted local shell code.
      - Documentation includes a Codex CLI example matching the resolved command contract.
      - README documents per-mirror sync generator/editor prompts and the existing partial-state failure mode where earlier upstream pushes may already have completed.
    files_touched:
      - README.md
    evidence:
      - command: git diff --check
        result: PASSED with no output.
      - command: bazel test //...
        result: PASSED; README documentation updated for env var, placeholders, trusted shell behavior, review/failure flow, and sync partial-state behavior.
    commit:
      hash: not_required
      message: not_required

  - id: PLAN-APPROVAL
    title: Request and record user plan approval
    status: completed
    priority: high
    depends_on:
