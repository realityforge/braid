  - id: T01
    title: Extract internal command test helpers
    status: completed
    priority: high
    depends_on:
      - PLAN-APPROVAL
    acceptance_criteria:
      - Shared command test helpers are not defined in feature-specific test files.
      - Helpers remain test-only and in package command.
      - Helper-only _test.go files do not receive standalone go_test labels unless they contain runnable tests.
      - Existing test bodies are changed only as needed for helper movement.
    files_touched:
      - internal/command/*_test.go
      - internal/command/test_support_test.go
    evidence:
      - command: rg -n "func (initDownstream|runCommandOK|runCommandOKInDir|runCommandOKWithOutput|runCommandError|runCommandErrorInDir|runCommandErrorWithOutput|assertContains|assertNotContains|withUserCacheDir|envLookup|writeEditor|writeGenerator|writeFailingEditor|writeSequenceCapturingEditor|commitAllWithMessage|writeLockedMirrorConfig|forbidMergeTreeGit|runCommandOKInDirWithOptions)\b" internal/command/*_test.go
        result: pass; shared helpers are defined only in internal/command/test_support_test.go
      - command: rg -n "^func (Test|Benchmark|Fuzz|Example)" internal/command/test_support_test.go
        result: pass; no runnable tests in helper-only source
    commit:
      hash: not_required
      message: not_required; consolidated final commit requested after review

