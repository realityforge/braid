      - AGENTS.md
    evidence:
      - command: sed -n '1,180p' .github/workflows/ci.yml
        result: pass; final integration matrix command is bazel test //integration/...
      - command: sed -n '1,80p' AGENTS.md
        result: pass; required checks match the final CI workflow
      - command: rg -n "command_test|braid_integration_test|tags = \[\"manual\"\]|//integration:braid_integration_test|//internal/command:command_test" internal/command/BUILD.bazel integration/BUILD.bazel .github/workflows/ci.yml AGENTS.md README.md
        result: pass; no matches in current BUILD, CI, AGENTS, or README files
    commit:
      hash: not_required
      message: not_required; consolidated final commit requested after review

  - id: T05
