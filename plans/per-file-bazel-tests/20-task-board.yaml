        result: pass; listed conflict_test, lifecycle_test, scoped_state_test, setup_failure_test, subdirectory_test, and sync_test only
      - command: bazel test //integration/...
        result: pass; 6 integration test targets passed
    commit:
      hash: not_required
      message: not_required; consolidated final commit requested after review

  - id: T04
    title: Update CI and developer parity notes
    status: completed
    priority: high
    depends_on:
      - T02
      - T03
    acceptance_criteria:
      - .github/workflows/ci.yml uses target patterns rather than removed aggregate labels.
      - AGENTS.md required checks match .github/workflows/ci.yml.
      - Current developer-facing docs mentioning removed aggregate labels are updated.
      - Historical plan artifacts are not edited solely to rewrite old aggregate labels.
    files_touched:
