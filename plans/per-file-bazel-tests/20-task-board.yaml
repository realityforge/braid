        result: pass; 0 issues
      - command: bazel test //integration/...
        result: pass; 6 integration test targets passed
      - command: ruby -e 'require "yaml"; YAML.load_file("plans/per-file-bazel-tests/20-task-board.yaml"); puts "ok"'
