    acceptance_criteria:
      - internal/command/BUILD.bazel has one go_test per command *_test.go feature file.
      - //internal/command:command_test is removed.
      - No converted command test target has the manual tag.
      - Command per-file test targets preserve timeout = "long" unless focused timing supports a narrower timeout.
      - Focused command labels and //internal/command/... pass.
    files_touched:
      - internal/command/BUILD.bazel
    evidence:
      - command: bazel query 'kind("go_test rule", //internal/command:*)'
        result: pass; listed add_test, cache_test, diff_test, path_test, preflight_test, push_test, remove_test, setup_test, status_test, sync_test, and update_test only
      - command: bazel test //internal/command:add_test
        result: pass; 1 test target passed in 17.5s
      - command: bazel test //internal/command:push_test
        result: pass; 1 test target passed in 70.5s, supporting preserved long timeout
      - command: bazel test //internal/command:sync_test
        result: pass; 1 test target passed in 83.3s, supporting preserved long timeout
      - command: bazel test //internal/command/...
        result: pass; 11 command test targets passed
    commit:
      hash: not_required
      message: not_required; consolidated final commit requested after review

