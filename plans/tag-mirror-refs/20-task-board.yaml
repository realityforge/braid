tasks:
  - id: T01
    title: Add downstream tag-ref regression coverage
    status: completed
    priority: high
    depends_on: []
    acceptance_criteria:
      - Tag add and update coverage rejects downstream global tag creation.
      - A pre-existing same-named downstream tag retains its object ID.
      - Normal cleanup removes the isolated ref and --keep retains it.
      - Two retained remotes tracking the same tag name have distinct refs that resolve independently.
      - Lightweight and annotated tags and all cache modes are represented.
    files_touched:
      - internal/command/*_test.go
      - integration/*_test.go
    evidence:
      - command: bazel test --test_env=PATH //internal/mirror:mirror_test //internal/command:add_test //internal/command:cache_test //internal/command:sync_test //internal/command:refresh_command_test
        result: pass
    commit:
      hash: pending
      message: pending

  - id: T02
    title: Isolate downstream tag mirror refs
    status: completed
    priority: high
    depends_on: [T01]
    acceptance_criteria:
      - Mirror.LocalRef returns refs/remotes/<remote>/tags/<tag> for tag mirrors.
      - Downstream tag fetches use +refs/tags/<tag>:refs/remotes/<remote>/tags/<tag>.
      - No command path writes the mirrored tag to downstream refs/tags.
      - Existing downstream tags are not deleted or modified.
    files_touched:
      - internal/mirror/mirror.go
      - internal/mirror/mirror_test.go
      - internal/command/cache.go
    evidence:
      - command: bazel test --test_env=PATH //internal/mirror:mirror_test //internal/command:add_test //internal/command:cache_test //internal/command:sync_test //internal/command:refresh_command_test
        result: pass
    commit:
