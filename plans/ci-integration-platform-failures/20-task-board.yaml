        result: "pass: fast-path and sync command coverage executed"
      - command: "bazel test //internal/command:command_test --nocache_test_results --test_output=errors"
        result: "pass after implementation review fixes: forbidden MergeTreeWrite coverage includes remote-path, process-subdirectory, single-file, and config-only fast paths"
      - command: "bazel test //integration:braid_integration_test --test_output=errors --nocache_test_results"
        result: "pass: executable update/sync integration aggregate executed"
    commit:
