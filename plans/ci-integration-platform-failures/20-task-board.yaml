      message: "fix(update): stabilize platform integration behavior"

  - id: T02
    title: Implement structured merge-tree conflict parsing
    status: completed
    priority: high
    depends_on:
      - T01
    acceptance_criteria:
      - "`internal/gitexec.MergeTreeWrite` exposes structured conflict paths."
      - Parser boundaries distinguish tree OID, conflicted path records, and informational message records.
      - Parser treats the first empty NUL record after the tree OID as the end of the conflicted-path section.
      - Conflict status comes from Git exit status, not from whether the structured path list is empty.
      - Conflict paths are deduplicated with deterministic output order.
      - Conflict status with no structured path still produces deterministic Braid conflict output.
      - Conflict parsing handles paths with spaces.
      - Braid no longer depends on Git free-form `merge-tree --messages` text for machine behavior.
      - Q-01 conflict output decision is implemented.
      - "True conflict integration tests still verify conflict markers, recovery commands, staged config, and `MERGE_MSG`."
    files_touched:
      - internal/gitexec/gitexec.go
      - internal/gitexec/gitexec_test.go
      - internal/command/update.go
      - internal/command/update_test.go
      - integration/conflict_test.go
    evidence:
      - command: "bazel test //internal/gitexec:gitexec_test --nocache_test_results --test_output=errors"
        result: "pass: structured merge-tree parser tests executed"
      - command: "bazel test //internal/gitexec:gitexec_test --nocache_test_results --test_output=errors"
        result: "pass after implementation review fixes: conflict exit with empty NUL-delimited structured path section uses deterministic fallback"
      - command: "bazel test //internal/command:command_test --nocache_test_results --test_output=errors"
        result: "pass: update conflict behavior executed"
      - command: "bazel test //integration:braid_integration_test --test_output=errors --nocache_test_results"
        result: "pass: executable conflict integration aggregate executed"
    commit:
      hash: 804669a
      message: "fix(update): stabilize platform integration behavior"

  - id: T03
    title: Harden Windows integration editor capture
    status: completed
    priority: high
    depends_on:
      - PLAN-APPROVAL
    acceptance_criteria:
      - Windows capture editor reliably copies Git's commit message file before writing the final message.
      - The helper reports a useful diagnostic if Git invokes it without a message-file argument.
      - Non-Windows editor helpers retain current behavior unless shared simplification is required.
      - Push provenance template integration coverage remains intact.
    files_touched:
