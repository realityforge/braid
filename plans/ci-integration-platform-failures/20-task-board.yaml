  - id: T01
    title: Implement update fast-path classification
    status: completed
    priority: high
    depends_on:
      - PLAN-APPROVAL
    acceptance_criteria:
      - Update compares `HEAD` mirror item against recorded base and selected remote items.
      - Update represents current mirror item state as present, absent, or error.
      - Local-equals-base updates bypass `merge-tree` and commit remote mirror content plus config.
      - Local-equals-remote updates bypass `merge-tree` and commit config-only revision updates.
      - Command tests fail if `MergeTreeWrite` is invoked for local-equals-base or local-equals-remote fast paths.
      - Divergent local/base/remote updates continue through synthetic merge.
      - Committed local mirror deletions are classified as divergent and covered by tests.
      - Existing scoped cleanliness and unrelated state preservation remain covered.
    files_touched:
      - internal/command/update.go
      - internal/command/update_test.go
      - internal/command/sync_test.go
      - integration/lifecycle_test.go
      - integration/subdirectory_test.go
