        result: pass
    commit:
      hash: not_required
      message: not_required

  - id: T01
    title: Add Git plumbing for scoped status, merge-tree, temporary-index commit, and narrow restore
    status: completed
    priority: high
    depends_on:
      - PLAN-APPROVAL
    acceptance_criteria:
      - Git wrapper can check status for explicit pathspecs without parsing unrelated paths.
      - Git wrapper can detect unmerged index entries and in-progress operation sentinels.
      - Git wrapper supports `merge-tree --write-tree` and captures conflict output.
      - Git wrapper can run `commit --no-verify` with an alternate index.
      - Git wrapper can restore only explicit pathspecs into the real index and worktree.
      - Unit tests cover new gitexec behavior.
    files_touched:
      - internal/gitexec/gitexec.go
      - internal/gitexec/gitexec_test.go
      - internal/command/preflight.go
    evidence:
      - command: bazel test //internal/gitexec:gitexec_test
        result: pass (cached after rerun)
    commit:
      hash: not_required
      message: not_required

  - id: T02
    title: Implement update-scoped cleanliness and target selection
    status: completed
    priority: high
    depends_on:
      - T01
    acceptance_criteria:
      - "`RequirementsFor(cli.CommandUpdate)` no longer requires global clean state."
      - Update rejects unresolved Git operation state before scoped path checks.
      - "`braid update <path>` checks only `.braids.json` and the target mirror path."
      - "`braid update` checks `.braids.json` and all eligible branch/tag mirrors before fetch/setup/cache/worktree/commit side effects."
      - Locked mirrors do not participate in update-all scoped checks.
      - "Dirty scoped paths fail with `local changes are present in <path>`."
      - "Mirror paths overlapping `.braids.json` are rejected."
    files_touched:
      - internal/command/preflight.go
      - internal/command/update.go
      - internal/command/preflight_test.go
      - internal/command/update_test.go
    evidence:
      - command: bazel test //internal/command:command_test
        result: pass
    commit:
      hash: not_required
      message: not_required

  - id: T03
    title: Rework non-conflicting update commits to preserve unrelated index and worktree state
    status: completed
    priority: high
    depends_on:
      - T02
    acceptance_criteria:
      - "Automatic update commits contain only the mirror path and `.braids.json`."
      - Unrelated staged changes remain staged and are excluded from the Braid commit.
      - Unrelated unstaged tracked changes remain unstaged.
      - Unrelated untracked files remain untracked.
      - Up-to-date updates leave unrelated state untouched.
      - Directory and single-file mirrors are supported.
      - Deletes and renames inside the mirror are represented correctly in the Braid update commit.
      - Temporary-index update commits skip pre-commit hooks and still run post-commit hooks.
    files_touched:
      - internal/command/update.go
      - internal/command/update_test.go
      - internal/gitexec/gitexec.go
      - internal/gitexec/gitexec_test.go
    evidence:
      - command: bazel test //internal/command:command_test
        result: pass
    commit:
      hash: not_required
      message: not_required

  - id: T04
    title: Rework conflict update path with scoped materialization
    status: completed
    priority: high
    depends_on:
      - T03
    acceptance_criteria:
      - Conflict markers are written only under the mirror path.
      - "`.braids.json` is advanced and staged at the new revision."
      - "`.git/MERGE_MSG` is written with the Braid update subject."
      - Unrelated index and worktree state is preserved.
      - A warning is emitted when unrelated staged entries exist during conflict output.
      - Proper unmerged stages are implemented if practical; otherwise the explicit marker-file fallback status is documented in tests and docs.
      - If marker-file fallback is used without native merge state, output/docs/tests require `git commit -F .git/MERGE_MSG` or equivalent for the resolution commit message.
    files_touched:
      - internal/command/update.go
      - internal/command/update_test.go
      - internal/gitexec/gitexec.go
      - internal/gitexec/gitexec_test.go
    evidence:
      - command: bazel test //internal/command:command_test
        result: pass
    commit:
      hash: not_required
      message: not_required

  - id: T05
    title: Add integration coverage for scoped update success and conflicts
    status: completed
    priority: high
    depends_on:
      - T04
    acceptance_criteria:
      - Integration success test covers unrelated staged, unstaged tracked, and untracked files.
      - Integration success test proves Braid commit excludes unrelated files.
      - Integration conflict test proves conflict markers, `MERGE_MSG`, staged `.braids.json`, and unrelated staged blob preservation.
      - Integration update-all test proves dirty eligible mirror blocks before fetch/setup/cache/worktree/commit side effects.
    files_touched:
      - integration/braid_integration_test.go
    evidence:
      - command: bazel test //integration:braid_integration_test
        result: pass
    commit:
      hash: not_required
      message: not_required

  - id: T06
    title: Update README and run full validation
    status: completed
    priority: medium
    depends_on:
      - T05
    acceptance_criteria:
      - "README no longer says update requires the whole worktree to be clean."
      - README explains scoped update cleanliness and preservation of unrelated changes.
      - README conflict recovery guidance avoids broad `git reset --hard` when unrelated work may exist.
      - README conflict fallback instructions do not imply plain `git commit` automatically uses `.git/MERGE_MSG` unless native merge state exists.
      - "Full gate `bazel test //...` passes."
      - Task board evidence is updated.
    files_touched:
      - README.md
      - plans/scoped-update-cleanliness/20-task-board.yaml
    evidence:
      - command: bazel test //...
        result: pass
    commit:
      hash: not_required
      message: not_required

