    acceptance_criteria:
      - No-path update and sync preserve branch/tag-only target selection.
      - Locked mirrors remain excluded before scoped cleanliness checks.
      - Explicit locked mirror update and pull-only sync behavior remains unchanged.
      - User-visible behavior matches the resolved Q-01 decision.
      - No-path update prints the exact skipped-mirror stdout after a successful command when locked mirrors are skipped.
      - No-path sync and no-path sync --pull-only print the same exact skipped-mirror stdout after a successful command when locked mirrors are skipped.
      - Skipped mirror paths are listed in lexicographic mirror path order.
      - Commands with no skipped locked mirrors remain quiet.
      - Explicit-path commands remain quiet for this diagnostic.
      - Failed no-path commands do not print the skipped-mirror diagnostic.
      - Tests assert exact output for one skipped mirror and multiple skipped mirrors.
      - Tests assert exact output for all-locked no-path update and no-path sync cases.
      - Tests assert no-path update conflict output appears before the skipped-mirror diagnostic when locked mirrors are skipped.
      - Tests assert quiet output for no locked mirrors and explicit locked mirror pull-only sync.
      - README documents the skipped-mirror stdout note, explicit-path quiet behavior, and lexicographic no-path mirror ordering.
