      message: "feat(cli): parse sync autostash flag"

  - id: T02
    title: Add Git stash and ignored-aware status plumbing
    status: completed
    priority: high
    depends_on:
      - T01
    acceptance_criteria:
      - Git operations for path-scoped stash save are behind `internal/gitexec`.
      - Git operations for stash worktree apply are behind `internal/gitexec`.
      - Git operations for selected-path index restoration from the stash index parent are behind `internal/gitexec`.
      - Git operations for resolving and dropping the saved stash entry are behind `internal/gitexec`.
      - Stash save captures the created entry OID and identifying metadata.
      - Stash drop resolves the current stash reflog selector for the saved entry before deleting it.
      - Ambiguous or missing stash drop lookup leaves the stash recoverable with manual cleanup instructions.
      - Ignored-aware selected-path status is available for autostash decisions.
      - Pathspec handling is NUL-safe.
      - Real Git tests cover staged, unstaged, deleted, untracked, and ignored path-scoped restoration.
      - Tests cover existing stash entries so the implementation does not apply or drop the wrong entry.
      - Tests prove ignored files outside selected pathspecs are not captured.
      - Tests prove ignored-only selected mirror state is detected.
      - Tests prove unrelated staged and unstaged paths outside selected pathspecs are preserved.
      - Tests prove whole-stash `apply --index` is not used for restoration.
    files_touched:
      - internal/gitexec/gitexec.go
      - internal/gitexec/gitexec_test.go
      - internal/command/preflight.go
    evidence:
      - command: "bazel test //internal/gitexec:gitexec_test"
        result: "pass: 1 test target passed"
    commit:
      hash: 55897243fcba70f6b14c0b27fb4a3e9866e26e25
      message: "feat(gitexec): add scoped autostash plumbing"

  - id: T03
    title: Implement update status and sync autostash orchestration
    status: completed
    priority: high
    depends_on:
      - T02
    acceptance_criteria:
      - Sync without the flag preserves current dirty selected mirror behavior.
      - Sync with the flag saves dirty selected mirror paths after immutable blockers pass and before sync side effects.
      - Sync with the flag detects ignored-only selected mirror state before deciding whether to save.
      - Dirty `.braids.json` still blocks even with the flag.
      - Unresolved Git operation state still blocks even with the flag.
      - Update internals return an explicit status for no-op, updated, and conflict outcomes.
      - Sync detects update conflict status even when update exits successfully for existing public behavior.
      - Update internals carry conflict status even when a later conflict-instruction or `MERGE_MSG` write returns an error.
      - Existing `braid update` public conflict behavior remains covered.
      - Sync with a saved autostash returns non-zero after update conflict state and leaves the stash intact.
      - Sync suppresses automatic stash restore after partial update-conflict failure.
      - Explicit sync only saves selected mirror paths.
      - No-path sync only saves selected no-path targets.
      - Sync restores saved worktree state and selected mirror-path index state when policy allows.
      - Saved state is dropped only after successful restoration.
      - Successful stash apply followed by unresolved stash drop returns a cleanup error with restored work preserved.
      - Saved state remains recoverable with clear diagnostics when restoration is skipped or fails.
    files_touched:
      - internal/command/update.go
      - internal/command/update_test.go
      - internal/command/sync.go
      - internal/command/sync_test.go
      - internal/command/BUILD.bazel
    evidence:
      - command: "bazel test //internal/command:command_test"
        result: "pass: 1 test target passed"
    commit:
      hash: 1017eed478ee205eed827c4c36788ec5d4573554
      message: "feat(sync): orchestrate scoped autostash restore"

  - id: T04
    title: Add command and integration coverage
    status: completed
    priority: high
    depends_on:
      - T03
    acceptance_criteria:
      - Command tests cover no-flag dirty failure.
      - Command tests cover staged plus unstaged restoration.
      - Command tests cover untracked restoration.
      - Command tests cover ignored-only selected mirror autostash.
      - Command tests cover non-selected dirty mirror preservation.
      - Command tests cover unrelated staged and unstaged paths outside selected mirrors.
      - Command tests cover sync failure after save and restoration attempt.
      - Command or integration tests cover update conflict policy, non-zero autostash sync exit, and recovery instructions.
      - Command tests cover partial update-conflict failure after conflict state is written.
      - Command tests cover successful stash apply followed by unresolved stash drop/cleanup.
      - Command or integration coverage confirms existing `braid update` conflict behavior remains success with stdout instructions.
      - Integration coverage proves a successful executable `sync --autostash` workflow.
      - Targeted command and integration gates pass.
    files_touched:
      - internal/command/sync_test.go
      - internal/command/update_test.go
      - integration/braid_integration_test.go
    evidence:
      - command: "bazel test //internal/command:command_test"
        result: "pass: 1 test target passed"
      - command: "bazel test //integration:braid_integration_test"
        result: "pass: 1 test target passed"
    commit:
      hash: 1c41c41ae7fb572d2398b4842bb756115ba5b6ba
      message: "test(sync): cover autostash command workflows"

  - id: T05
    title: Update docs and run full gate
    status: completed
    priority: medium
    depends_on:
      - T04
    acceptance_criteria:
      - README documents the selected flag.
      - README explains that tracked, untracked, and ignored selected mirror-path files are captured.
      - README explains that uncommitted mirror changes are not pushed.
      - README explains recovery behavior when restoration fails or is skipped.
      - Full gate `bazel test //...` passes.
      - "`git diff --check` passes."
    files_touched:
