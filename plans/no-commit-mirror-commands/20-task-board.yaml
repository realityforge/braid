plan:
  id: no-commit-mirror-commands
  title: "Stage add/pull/remove mirror changes without committing"
  status: accepted
  active_task: null
  required_full_gate:
    - "bazel run @rules_go//go -- fmt ./..."
    - "git diff --exit-code"
    - "bazel test --test_env=PATH //..."
    - "bazel run @rules_go//go -- vet ./..."
    - "bazel run @rules_go//go -- run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.0 run"
    - "bazel test --test_env=PATH //integration/..."

tasks:
  - id: PLAN-001
    title: "Draft structured requirements and implementation plan"
    status: completed
    priority: P0
    depends_on: []
    acceptance_criteria:
      - "Requirements document records scope, behavior, gates, and resolved design questions."
      - "Implementation plan records sequencing, risks, full gate, and decision log."
      - "Task board records plan approval as pending before implementation."
      - "Test strategy records unit and integration coverage expectations."
    files_touched:
      - "plans/no-commit-mirror-commands/00-requirements.md"
      - "plans/no-commit-mirror-commands/10-implementation-plan.md"
      - "plans/no-commit-mirror-commands/20-task-board.yaml"
      - "plans/no-commit-mirror-commands/40-test-strategy.md"
    evidence:
      - command: "find plans -maxdepth 3 -type f -print"
        result: "No existing plans directory; created new plan tree."
      - command: "sed -n '1,220p' .github/workflows/ci.yml"
        result: "CI gates inspected; plan records required local full gate and CI notes."
    commit:
      hash: not_required
      message: "Planning artifact creation only; no implementation commit requested."
    history:
      - "Drafted after grill decisions Q-01 through Q-39 and user clarification that unit tests must cover all functionality."
      - "Iterative plan review round 1 fixed no-path pull state model, targeted command names, CI-parity test flags, integration enforceability, alias completion contract, and output contract."
      - "Iterative plan review round 2 fixed no-path pull unrelated-staged warning scope for all invocation-selected mirror paths."

  - id: PLAN-APPROVAL
    title: "User reviews and accepts structured plan"
    status: completed
    priority: P0
    depends_on:
      - PLAN-001
    acceptance_criteria:
      - "User is explicitly asked to review the latest plan."
      - "Feedback is incorporated into 00, 10, 20, and 40 artifacts as needed."
      - "Plan status is changed to accepted only after review outcome is recorded."
    files_touched:
      - "plans/no-commit-mirror-commands/00-requirements.md"
      - "plans/no-commit-mirror-commands/10-implementation-plan.md"
      - "plans/no-commit-mirror-commands/20-task-board.yaml"
      - "plans/no-commit-mirror-commands/40-test-strategy.md"
    evidence:
      - command: "User request: implement and then iterative-plan-implementation-review"
        result: "Treated as approval of the revised reviewed plan; plan status changed to accepted."
    commit:
      hash: not_required
      message: "Plan approval recorded without commit; user did not request commits."

  - id: CLI-001
    title: "Add no-commit CLI surface and completion"
    status: completed
    priority: P0
    depends_on:
      - PLAN-APPROVAL
    acceptance_criteria:
      - "`add`, `pull`, `update`, `up`, and `remove` parse `--no-commit`."
      - "Usage strings expose the flag on canonical commands."
      - "Root Bash completion remains canonical-only, while typed `update` and `up` aliases complete supported options and mirror paths including `--no-commit`."
      - "Unit tests cover parsing, aliases, rejection on unsupported commands, usage, and completion."
    files_touched:
      - "internal/cli/*"
      - "internal/command/completion*"
    evidence:
      - command: "bazel test //internal/cli:cli_test"
        result: "Passed; parser tests cover add, pull, update, up, remove, usage, and sync rejection for --no-commit."
      - command: "bazel test //internal/command:completion_test"
        result: "Passed; completion tests cover --no-commit candidates and typed update/up alias completion."
      - command: "bazel test --test_env=PATH //..."
        result: "Passed; includes //internal/cli:cli_test and //internal/command:completion_test."
    commit:
      hash: not_required
      message: "Implementation remains uncommitted; user did not request commits."

  - id: CORE-001
    title: "Add shared no-commit staging support"
    status: completed
    priority: P0
    depends_on:
      - CLI-001
    acceptance_criteria:
      - "Shared helper stages selected paths from synthetic final tree into index and worktree."
      - "Helper warns about pre-existing unrelated staged changes before staging."
      - "Helper suppresses success messages under `--quiet` but not warnings."
      - "Unit tests cover helper behavior and injected staging failure."
    files_touched:
      - "internal/command/*"
      - "internal/gitexec/*"
    evidence:
      - command: "bazel test //internal/command/..."
        result: "Passed; add/update/remove tests exercise shared staging, warning, quiet, and injected restore failures."
      - command: "bazel test --test_env=PATH //..."
        result: "Passed; all command package tests passed in the full target set."
    commit:
      hash: not_required
      message: "Implementation remains uncommitted; user did not request commits."

  - id: ADD-001
    title: "Implement and test add --no-commit"
    status: completed
    priority: P0
    depends_on:
      - CORE-001
    acceptance_criteria:
      - "Stages first-add config and mirror content without changing HEAD."
      - "Preserves unrelated staged, unstaged, and untracked files."
      - "Warns on unrelated staged changes."
      - "Blocks dirty config and target paths."
      - "Honors quiet success suppression."
      - "Cleans temporary remote and reports staged cleanup failures."
    files_touched:
      - "internal/command/add*"
      - "integration/*"
    evidence:
      - command: "bazel test //internal/command/..."
        result: "Passed; add tests cover staging content/config, preservation, warnings, quiet, cleanup failure, and staging failure."
      - command: "bazel test --test_env=PATH //integration:no_commit_test"
        result: "Passed; executable workflow covers add --no-commit with unrelated staged, unstaged, and untracked work while HEAD stays unchanged."
      - command: "bazel test --test_env=PATH //..."
        result: "Passed; includes add unit and executable no-commit integration coverage."
    commit:
      hash: not_required
      message: "Implementation remains uncommitted; user did not request commits."

  - id: PULL-001
    title: "Implement and test pull/update/up --no-commit"
    status: completed
    priority: P0
    depends_on:
      - CORE-001
    acceptance_criteria:
      - "Single mirror update stages config and mirror deltas without changing HEAD."
      - "No-op update leaves index and worktree untouched."
      - "Config-only tracking changes stage `.braids.json`."
      - "No-path pull updates multiple eligible mirrors and skips locked mirrors."
      - "No-path pull preflights all eligible targets once, then allows same-invocation partial staging if a later target fails or conflicts."
      - "No-path pull unrelated-staged warning detection excludes all eligible mirror paths selected by the invocation and only warns for genuinely unrelated pre-existing staged files."
      - "Upstream deletions are staged."
      - "Conflict output and recovery state remain current behavior."
      - "Dirty owned paths block before side effects."
    files_touched:
      - "internal/command/update*"
      - "integration/*"
    evidence:
      - command: "bazel test //internal/command/..."
        result: "Passed; update tests cover single mirror, aliases, no-op, config-only changes, deletion/rename staging, no-path multi-mirror, warning scope, dirty blocker, no-path partial progress when a later mirror conflicts or errors, and conflict behavior."
      - command: "bazel test //internal/command:refresh_command_test"
        result: "Passed after adding TestUpdateCommandAllNoCommitLeavesEarlierStagedUpdateWhenLaterMirrorConflicts for implementation-review round 1 and TestUpdateCommandAllNoCommitLeavesEarlierStagedUpdateWhenLaterMirrorErrors for round 2."
      - command: "bazel test --test_env=PATH //integration:no_commit_test"
        result: "Passed; executable tests cover pull/update --no-commit, no-path multi-mirror with locked skip, subdirectory invocation, dirty blocker, and conflict recovery."
      - command: "bazel test --test_env=PATH //..."
        result: "Passed; includes all pull/update no-commit unit and integration coverage."
    commit:
      hash: not_required
      message: "Implementation remains uncommitted; user did not request commits."

  - id: REMOVE-001
    title: "Implement and test remove --no-commit"
    status: completed
    priority: P0
    depends_on:
      - CORE-001
    acceptance_criteria:
      - "Stages `.braids.json` update and mirror deletion without changing HEAD."
      - "Preserves unrelated staged, unstaged, and untracked files."
      - "Warns on unrelated staged changes."
      - "Blocks dirty config and mirror paths."
      - "`--keep` keeps only the remote and does not keep files."
      - "Remote cleanup failure uses staged-specific wording."
    files_touched:
      - "internal/command/remove*"
      - "integration/*"
    evidence:
      - command: "bazel test //internal/command/..."
        result: "Passed; remove tests cover staging deletion/config, preservation, warning, quiet, keep remote-only behavior, cleanup failure, and staging failure."
      - command: "bazel test --test_env=PATH //integration:no_commit_test"
        result: "Passed; executable workflow covers remove --no-commit and remove --keep --no-commit with unrelated state preserved."
      - command: "bazel test --test_env=PATH //..."
        result: "Passed; includes remove unit and executable no-commit integration coverage."
    commit:
      hash: not_required
      message: "Implementation remains uncommitted; user did not request commits."

  - id: DOC-001
    title: "Document no-commit behavior"
    status: completed
    priority: P1
    depends_on:
      - INT-001
    acceptance_criteria:
      - "README documents supported commands and staged behavior."
      - "Docs warn that already-staged unrelated files will join the next commit unless unstaged."
      - "Migration notes reflect the exception to automatic commit behavior."
      - "Docs avoid implying unstaged behavior or sync support."
    files_touched:
      - "README.md"
      - "docs/migration-from-ruby-braid.md"
    evidence:
      - command: "rg -n -e \"--no-commit\" README.md docs/migration-from-ruby-braid.md"
        result: "Docs mention supported commands, staged behavior, unrelated-staged warning, remove --keep semantics, and avoid sync support."
      - command: "bazel test --test_env=PATH //..."
        result: "Passed after documentation changes."
    commit:
      hash: not_required
      message: "Implementation remains uncommitted; user did not request commits."

  - id: INT-001
    title: "Add executable integration coverage for no-commit flows"
    status: completed
    priority: P0
    depends_on:
      - ADD-001
      - PULL-001
      - REMOVE-001
    acceptance_criteria:
      - "`add --no-commit` executable path preserves unrelated staged, unstaged, and untracked work and leaves HEAD unchanged."
      - "`pull --no-commit` executable path stages a real upstream update and leaves HEAD unchanged."
      - "`update --no-commit` alias is covered in at least one executable path."
      - "No-path `pull --no-commit` covers multiple eligible mirrors, locked skipped mirror output, and same-invocation staged state."
      - "No-path `pull --no-commit` integration coverage proves earlier same-invocation staged mirrors do not cause a false unrelated-staged warning."
      - "`remove --no-commit` executable path stages deletion and preserves unrelated state."
      - "`remove --no-commit --keep` keeps the configured remote while staging file/config removal."
      - "Subdirectory invocation is covered for at least one no-commit command."
      - "Pull conflict under `--no-commit` proves output and recovery state remain unchanged."
      - "Dirty owned-path blocker under no-commit is covered while unrelated work remains preserved."
    files_touched:
      - "integration/*"
      - "integration/BUILD.bazel"
    evidence:
      - command: "bazel test --test_env=PATH //integration:no_commit_test"
        result: "Passed; covers TestExecutableNoCommitAddUpdateRemoveWorkflow, TestExecutableNoCommitPullAllAndDirtyBlocker, and TestExecutableNoCommitPullConflictMatchesExistingRecovery."
      - command: "rg -n \"func TestExecutableNoCommit\" integration/no_commit_test.go"
        result: "Found executable tests for add/update/remove workflow, no-path pull with dirty blocker, and pull conflict recovery."
      - command: "bazel test --test_env=PATH //integration/..."
        result: "Passed; all executable integration targets passed with the new no_commit_test target."
