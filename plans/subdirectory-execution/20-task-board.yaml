    evidence:
      - command: bazel test //integration:braid_integration_test
        result: fail; absolute path test exposed /var versus /private/var logical path handling and outside-worktree diagnostics exposed raw Git errors
      - command: bazel test //integration:braid_integration_test
        result: pass
    commit:
      hash: ce71114f202aafb8cf73e86c2077c612c07224f4
      message: "feat(command): support subdirectory execution"

  - id: T06
    title: Update README and run full validation
    status: completed
    priority: medium
    depends_on:
