  - id: T01
    title: Add repository runtime context and root discovery
    status: completed
    priority: high
    depends_on:
      - PLAN-APPROVAL
    acceptance_criteria:
      - Git wrapper exposes worktree root discovery.
      - Repository commands no longer reject non-empty `--show-prefix`.
      - Commands still reject execution outside a Git worktree.
      - Runtime context records process directory, Git worktree root, optional logical worktree root, process prefix, root Git runner, and process Git runner.
      - Handlers receive the resolved context instead of independently treating `Options.WorkDir` as the root.
      - Existing test hooks remain usable with documented `Options.WorkDir`, `Options.ConfigRoot`, and injected Git semantics.
    files_touched:
      - internal/gitexec/gitexec.go
      - internal/gitexec/gitexec_test.go
      - internal/command/preflight.go
      - internal/command/preflight_test.go
    evidence:
      - command: bazel test //internal/gitexec:gitexec_test //internal/command:command_test
        result: pass
      - command: bazel test //internal/gitexec:gitexec_test
        result: pass
    commit:
      hash: ce71114f202aafb8cf73e86c2077c612c07224f4
      message: "feat(command): support subdirectory execution"

  - id: T02
    title: Normalize command local_path inputs to repo-root paths
    status: completed
    priority: high
    depends_on:
      - T01
    acceptance_criteria:
      - Relative `local_path` inputs resolve against the process directory.
      - Omitted `add` default paths resolve under the process directory.
      - Absolute `local_path` inputs inside the worktree are accepted and normalized.
      - Paths outside the worktree are rejected before config mutation.
      - Backslash, dot, parent traversal, absolute symlink-spelled worktree, and logical symlink cases are covered.
      - Internal symlink invocation directories use Git's `WorkTreePrefix` for relative inputs and reject unsupported absolute symlink spellings clearly.
      - Selectors still require exact configured mirror root matches.
    files_touched:
      - internal/command/path.go
      - internal/command/add.go
      - internal/command/setup.go
      - internal/command/status.go
      - internal/command/diff.go
      - internal/command/update.go
      - internal/command/push.go
      - internal/command/remove.go
      - internal/command/*_test.go
    evidence:
      - command: bazel test //internal/command:command_test
        result: pass
    commit:
      hash: ce71114f202aafb8cf73e86c2077c612c07224f4
      message: "feat(command): support subdirectory execution"

  - id: T03
    title: Run Braid-owned Git and config operations from the worktree root
    status: completed
    priority: high
    depends_on:
      - T02
    acceptance_criteria:
      - "`.braids.json` is loaded and written from the worktree root."
      - Braid-owned Git pathspec operations use repo-root semantics.
      - Temporary-index commits and restores continue to operate on correct root paths.
      - Push alternates and Git metadata paths are resolved through Git-path helpers.
      - Cache path resolution remains process-directory-relative.
    files_touched:
      - internal/command/preflight.go
      - internal/command/cache.go
      - internal/command/add.go
      - internal/command/update.go
      - internal/command/remove.go
      - internal/command/push.go
      - internal/gitexec/gitexec.go
      - internal/command/*_test.go
    evidence:
      - command: bazel test //internal/command:command_test
        result: fail; setup_test.go missing os import after adding process-relative cache coverage
      - command: bazel test //internal/command:command_test
        result: pass
    commit:
      hash: ce71114f202aafb8cf73e86c2077c612c07224f4
      message: "feat(command): support subdirectory execution"

  - id: T04
    title: Preserve diff passthrough and subdirectory conflict instructions
    status: completed
    priority: high
    depends_on:
      - T03
    acceptance_criteria:
      - Raw `git diff` args after `--` retain process-directory Git behavior.
      - Final user-visible diff runs from the process Git runner.
      - Directory mirror diffs use root-path `--relative` without plain root pathspecs.
      - Single-file mirror diffs append `:(top)<repo-root-mirror-path>` as the internal limiter.
      - Existing mirror-relative diff prefixes remain stable.
      - Conflict instructions print the exact `git add -- ':(top)<mirror>' ':(top).braids.json'` and `git commit -F '<MERGE_MSG>'` command shape.
      - "`MERGE_MSG` paths come from `git rev-parse --git-path`."
    files_touched:
      - internal/command/diff.go
      - internal/command/update.go
      - internal/command/diff_test.go
      - internal/command/update_test.go
    evidence:
      - command: bazel test //internal/command:command_test
        result: fail; raw subdirectory passthrough test expected empty diff but Git correctly returned ambiguous pathspec
      - command: bazel test //internal/command:command_test
        result: pass
    commit:
      hash: ce71114f202aafb8cf73e86c2077c612c07224f4
      message: "feat(command): support subdirectory execution"

  - id: T05
    title: Add integration coverage for subdirectory workflows
    status: completed
    priority: high
    depends_on:
      - T04
    acceptance_criteria:
      - Integration test covers add/setup/status/diff/update/push/remove from a subdirectory.
      - Integration test proves no-path commands remain repository-wide.
      - Integration test covers absolute inside-worktree input, absolute symlink-spelled worktree input, and outside-worktree rejection.
      - Integration test executes the conflict recovery command shape from the original subdirectory.
    files_touched:
