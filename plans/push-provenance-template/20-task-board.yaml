  - id: T01
    title: Add Git plumbing for provenance templates and history reads
    status: completed
    priority: high
    depends_on:
      - PLAN-APPROVAL
    acceptance_criteria:
      - "`internal/gitexec` exposes a template-capable commit path while preserving current `CommitVerbose` behavior."
      - "Template-capable commits can force comment-stripping cleanup regardless of `commit.cleanup`."
      - Git comment character config can be read from the source repo.
      - The temporary push repository can receive the selected comment character before commit cleanup.
      - "New Git history/blob/tree operations needed by provenance code stay behind `internal/gitexec`."
      - Existing push identity and signing config propagation remains covered.
    files_touched:
      - internal/gitexec/gitexec.go
      - internal/gitexec/gitexec_test.go
      - internal/command/push.go
      - internal/command/push_test.go
    evidence:
      - command: bazel test //internal/gitexec:gitexec_test
        result: pass (1 test target passed in 5.2s)
      - command: bazel test //internal/gitexec:gitexec_test --test_filter=TestCoreCommentChar --cache_test_results=no
        result: pass (post-review whitespace core.commentChar regression passed in 0.6s)
    commit:
      hash: not_required
      message: not_required

  - id: T02
    title: Implement provenance discovery and formatting
    status: completed
    priority: high
    depends_on:
      - T01
    acceptance_criteria:
      - First-parent clean-anchor search compares historical downstream mirror items with historical recorded upstream items.
      - Mirror identity boundaries stop provenance traversal.
      - Full-history path traversal supplies eligible commits after the anchor.
      - Candidate commits are filtered by current mirror identity before display.
      - Braid automatic add/update/remove commits are excluded.
      - Root-with-matching-identity and no clean anchor produces the specified no-anchor guidance note.
      - Full commit messages are preserved line-for-line.
      - Every guidance line is prefixed with the selected comment character and one space.
      - The newest-25 cap and older-omitted-count note are applied after filtering.
      - No eligible commits produces no template and no warning.
    files_touched:
      - internal/command/push_provenance.go
      - internal/command/push_test.go
      - internal/command/sync_test.go
    evidence:
      - command: bazel test //internal/command:command_test --test_filter=TestPushCommandPushesBranchAndPreservesIdentity
        result: pass (1 filtered command test target passed in 2.7s)
    commit:
      hash: not_required
      message: not_required

  - id: T03
    title: Integrate provenance guidance into push and sync
    status: completed
    priority: high
    depends_on:
      - T02
    acceptance_criteria:
      - "`braid push` passes the commented guidance template to `git commit -v` when eligible commits exist."
      - Existing no-local-changes and not-up-to-date push behavior remains unchanged.
      - Provenance failures print warnings to stderr and continue without a template.
      - "`core.commentChar=auto` prints a warning and skips guidance."
      - "Custom single-character `core.commentChar` is respected by the temp repo and stripped from final upstream commit messages."
      - "`braid sync` shows per-mirror guidance by reusing the shared push path."
    files_touched:
      - internal/command/push.go
      - internal/command/sync.go
      - internal/command/push_test.go
      - internal/command/sync_test.go
    evidence:
      - command: bazel test //internal/command:command_test --test_filter=TestPushCommandPushesBranchAndPreservesIdentity
        result: pass (1 filtered command test target passed in 2.6s)
    commit:
      hash: not_required
      message: not_required

  - id: T04
    title: Add focused command coverage for provenance behavior
    status: completed
    priority: high
    depends_on:
      - T03
    acceptance_criteria:
      - Push editor receives commented full-message provenance for downstream commits touching the mirror.
      - Braid update commits are excluded while earlier local commits remain listed after update.
      - Custom comment character and `auto` handling are covered.
      - "`commit.cleanup=whitespace` is covered so commented guidance is not committed."
      - "`commit.cleanup=whitespace` coverage makes the setting visible to the temporary push repository or directly asserts the cleanup-forcing commit path."
      - Sync push receives the same guidance through the shared push path.
      - Cap behavior shows the newest 25 eligible commits and an older-omitted-count note.
      - Merge-history behavior is covered, including a merge commit that touches the mirror path.
      - Identity-boundary behavior is covered.
      - Side-branch commits from before the current mirror identity are excluded when merged after the first-parent identity boundary.
      - Root-with-matching-identity and no clean anchor behavior is covered.
      - Targeted command tests pass.
    files_touched:
      - internal/command/push_test.go
      - internal/command/sync_test.go
    evidence:
      - command: bazel test //internal/command:command_test --test_filter='TestPushCommandProvenance'
        result: pass (1 filtered command test target passed in 27.2s)
      - command: bazel test //internal/command:command_test --test_filter=TestSyncCommandProvenanceGuidanceIsPerPushedMirror
        result: pass (1 filtered command test target passed in 7.1s)
      - command: bazel test //internal/command:command_test
        result: pass (1 command test target passed in 240.6s)
      - command: bazel test //internal/command:command_test --test_filter='TestPushCommandProvenanceExcludesOnlyBraidAutomaticCommitsWithoutWarning|TestPushCommandProvenanceCommentCharAutoWarnsAndSkips' --cache_test_results=no
        result: pass (post-review regression target passed in 4.9s)
      - command: bazel test //internal/command:command_test --test_filter='TestPushCommandProvenanceCustomCommentCharAndCleanupWhitespace|TestPushCommandProvenanceSpaceCommentCharAndCleanupWhitespace' --cache_test_results=no
        result: pass (post-review custom/space comment-char cleanup regression passed in 4.0s)
    commit:
      hash: not_required
      message: not_required

