meta:
  project: cli-schema
  last_updated: 2026-07-12
  required_full_gates:
    - bazel run @rules_go//go -- fmt ./...
    - bazel test --test_env=PATH //...
    - bazel run @rules_go//go -- vet ./...
    - bazel run @rules_go//go -- run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.0 run
    - bazel test --test_env=PATH //integration/...
  statuses:
    - pending
    - in_progress
    - completed
    - cancelled

current_focus: complete

tasks:
  - id: T01
    title: Define and validate the CLI schema
    status: completed
    priority: high
    depends_on: []
    acceptance_criteria:
      - Schema represents every current command, alias, option, positional grammar, constraint, and completion role
      - Schema invariant tests reject ambiguous or incomplete definitions
    files_touched:
      - internal/cli
    evidence:
      - command: bazel test //internal/cli:cli_test
        result: pass
    commit:
      hash: not_required
      message: covered by final implementation commit

  - id: T02
    title: Drive parsing and usage from the schema
    status: completed
    priority: high
    depends_on: [T01]
    acceptance_criteria:
      - Parser consumes schema command, option, positional, passthrough, help, and constraint definitions
      - Existing invocation and diagnostic behavior remains covered
      - Usage is rendered from schema metadata
    files_touched:
      - internal/cli
    evidence:
      - command: bazel test //internal/cli:cli_test
        result: pass
    commit:
      hash: not_required
      message: covered by final implementation commit

  - id: T03
    title: Drive completion from schema roles
    status: completed
    priority: high
    depends_on: [T02]
    acceptance_criteria:
      - Completion has no independent command or option inventory
      - Dynamic candidates are resolved in internal/command from schema roles
      - Conditional and passthrough completion follows schema grammar
    files_touched:
      - internal/command/completion.go
      - internal/cli
    evidence:
      - command: bazel test //internal/command:completion_test
        result: pass
    commit:
      hash: not_required
      message: covered by final implementation commit

  - id: T04
    title: Generate structural completion contract coverage
    status: completed
    priority: high
    depends_on: [T03]
    acceptance_criteria:
      - Unit and executable tests derive cases from the schema
      - Cases cover every structurally distinct position and constraint transition
      - Focused dynamic-provider and emitted-script tests remain independent
    files_touched:
      - internal/command/completion_test.go
      - integration/completion_test.go
      - internal/cli
    evidence:
      - command: bazel test //internal/clitest:clitest_test //internal/command:completion_test //integration:completion_test
        result: pass
    commit:
      hash: not_required
      message: covered by final implementation commit

  - id: T05
    title: Validate and close implementation
    status: completed
    priority: high
    depends_on: [T04]
    acceptance_criteria:
      - All CI-parity gates pass
      - Diff and implementation alignment review find no unresolved issue
      - Implementation and plan cleanup are intentionally committed
    files_touched:
      - repository
    evidence:
      - command: bazel test --test_env=PATH //...
        result: pass (30 tests)
      - command: bazel run @rules_go//go -- vet ./...
        result: pass
      - command: bazel run @rules_go//go -- run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.0 run
        result: pass (0 issues)
      - command: bazel test --test_env=PATH //integration/...
        result: pass (7 tests)
      - command: implementation alignment review rounds 1-3
        result: pass (no remaining findings)
    commit:
      hash: not_required
      message: covered by final implementation commit

history:
