    title: Add CLI contracts and upgrade-config behavior
    status: completed
    priority: high
    depends_on: [T01]
    acceptance_criteria:
      - add accepts --partial-clone only with --path
      - upgrade-config commits only .braids.json by default
      - --no-commit stages only .braids.json
      - Missing, dirty, v2 no-op, and unsupported-version cases are covered
      - Failures restore original config worktree bytes and index entry
      - Post-commit failure restores the original HEAD before config snapshots
      - Unrelated staged and worktree changes remain byte-for-byte unchanged
    files_touched:
