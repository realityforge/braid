  - id: T03
    title: Implement repository-local partial-clone cache lifecycle
    status: completed
    priority: high
    depends_on: [T01]
    acceptance_criteria:
      - Both cache transport legs use blob:none for configured mirrors
      - Cache is a valid promisor repository that can lazily obtain selected blobs
      - Filter-incapable upstream fails without full-fetch fallback
      - Policy mismatch atomically rebuilds the stable cache path
      - Interrupted and failed swaps preserve or recover the last valid cache
      - Cache metadata and promisor remote configuration are validated explicitly
      - Partial downstream fetch connects directly to upstream and remains filtered
    files_touched:
      - internal/command/cache.go
      - internal/command/cache_test.go
      - internal/command/setup.go
      - internal/command/setup_test.go
      - internal/gitexec/gitexec.go
